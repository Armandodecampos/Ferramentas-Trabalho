<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas-Trabalho</title>
    <!-- Inclui a biblioteca Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Ícone da página -->
    <link rel="icon" href="https://dl.dropbox.com/scl/fi/r2a1ld2xtkxkdfc8dlsr5/tool.png?rlkey=schd5t3as8tzf71ld5dj07972&st=p6pfvznp&dl=0" type="image/jpg">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .container-botoes {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }

        .linha-botoes {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        /* Estilo para o container de cada botão com o texto */
        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* Espaço entre o nome e o botão */
            width: 100px;
        }

        .item-container p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #333;
        }

        .botao-circular {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .botao-circular:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .botao-circular:active {
            transform: scale(0.95);
        }

        .botao-circular i {
            pointer-events: none;
        }
        
        /* Cores individuais para cada botão */
        .qr-code-btn { background-color: #007bff; }
        .camera-btn { background-color: #28a745; }
        .relatorio-btn { background-color: #dc3545; }
        .pesquisa-btn { background-color: #ffc107; }
        .mais-opcoes-btn { background-color: #6c757d; }
        .acesso-btn { background-color: #6632C9; }
        .achados-perdidos-btn { background-color: #ff7f00; }
        .presenca-btn { background-color: #1e3a8a; }
        .estacionamento-btn { background-color: #b8860b; } /* DarkGoldenRod */

    </style>
</head>
<body>
    <div class="container-botoes">
        <!-- Primeira Linha -->
        <div class="linha-botoes">
            <div class="item-container">
                <button class="botao-circular qr-code-btn" onclick="window.open('https://armandodecampos.github.io/Gerador-de-QR-Code/', '_self')">
                    <i class="fas fa-qrcode"></i>
                </button>
                <p>QR Code</p>
            </div>
            <div class="item-container">
                <button class="botao-circular camera-btn" onclick="window.open('https://armandodecampos.github.io/Camera-Trabalho/', '_self')">
                    <i class="fas fa-camera"></i>
                </button>
                <p>Camera</p>
            </div>
            <div class="item-container">
                <button class="botao-circular relatorio-btn" onclick="window.open('https://armandodecampos.github.io/Sistema/', '_self')">
                    <i class="fas fa-file-alt"></i>
                </button>
                <p>Relatório</p>
            </div>
            <div class="item-container">
                <button class="botao-circular pesquisa-btn" onclick="window.open('https://armandodecampos.github.io/pesquisa-de-dados/', '_self')">
                    <i class="fas fa-search"></i>
                </button>
                <p>Pesquisa</p>
            </div>
            <div class="item-container">
                <button class="botao-circular mais-opcoes-btn" onclick="window.open('https://armandodecampos.github.io/Outras-ferramentas/', '_self')">
                    <i class="fas fa-plus"></i>
                </button>
                <p>Mais opções</p>
            </div>
        </div>

        <!-- Segunda Linha -->
        <div class="linha-botoes">
            <div class="item-container">
                <button class="botao-circular acesso-btn" onclick="window.open('https://armandodecampos.github.io/controledecessos/', '_blank')">
                    <i class="fas fa-door-open"></i>
                </button>
                <p>Liberações</p>
            </div>
            <div class="item-container">
                <button class="botao-circular achados-perdidos-btn" onclick="window.open('https://armandodecampos.github.io/Achados-e-Perdidos/', '_blank')">
                    <i class="fas fa-box-open"></i>
                </button>
                 <p>Achados e Perdidos</p>
            </div>
            <div class="item-container">
                <button class="botao-circular presenca-btn" onclick="window.open('https://armandodecampos.github.io/Controle-de-Presenca-Office/', '_blank')">
                    <i class="fas fa-users"></i>
                </button>
                 <p>Presença Office</p>
            </div>
            <!-- Botão Estacionamento com o link atualizado -->
            <div class="item-container">
                <button class="botao-circular estacionamento-btn" onclick="window.open('https://armandodecampos.github.io/Estacionamento/', '_blank')">
                    <i class="fas fa-car"></i>
                </button>
                 <p>Estacionamento</p>
            </div>
        </div>
    </div>
</body>
</html>
