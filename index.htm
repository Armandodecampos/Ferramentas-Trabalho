<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas-Trabalho</title>
    <!-- Inclui a biblioteca Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Ícone da página -->
    <link rel="icon" href="https://dl.dropbox.com/scl/fi/r2a1ld2xtkxkdfc8dlsr5/tool.png?rlkey=schd5t3as8tzf71ld5dj07972&st=p6pfvznp&dl=0" type="image/jpg">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
            overflow: hidden; /* Evita barras de rolagem quando a aranha passa */
        }

        .container-botoes {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            z-index: 1; /* Garante que os botões fiquem visíveis */
        }

        .linha-botoes {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100px;
        }

        .item-container p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #333;
        }

        .botao-circular {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .botao-circular:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .botao-circular:active {
            transform: scale(0.95);
        }

        /* --- Estilos da Aranha --- */
        #spider-container {
            position: absolute;
            pointer-events: none; /* Não interfere nos cliques dos botões */
            z-index: 9999;
            display: none;
            width: 100px;
            height: 100px;
            will-change: transform, left, top;
        }

        .spider-body-group {
            animation: bodyAgitation 0.15s infinite alternate ease-in-out;
        }

        @keyframes bodyAgitation {
            0% { transform: translateY(-1px) rotate(-2deg); }
            100% { transform: translateY(1px) rotate(2deg); }
        }

        @keyframes legCycle {
            0%, 100% { transform: rotate(0deg) skew(0deg); }
            25% { transform: rotate(15deg) skew(5deg); }
            75% { transform: rotate(-10deg) skew(-5deg); }
        }

        .leg { transform-origin: 50px 55px; animation: legCycle 0.18s infinite linear; }
        .leg-1 { animation-delay: 0.0s; }
        .leg-2 { animation-delay: 0.04s; }
        .leg-3 { animation-delay: 0.08s; }
        .leg-4 { animation-delay: 0.12s; }

        .shadow-layer {
            filter: blur(4px);
            opacity: 0.3;
        }
        
        /* Cores individuais para cada botão */
        .qr-code-btn { background-color: #007bff; }
        .camera-btn { background-color: #28a745; }
        .relatorio-btn { background-color: #dc3545; }
        .pesquisa-btn { background-color: #ffc107; }
        .mais-opcoes-btn { background-color: #6c757d; }
        .acesso-btn { background-color: #6632C9; }
        .achados-perdidos-btn { background-color: #ff7f00; }
        .presenca-btn { background-color: #1e3a8a; }
        .estacionamento-btn { background-color: #b8860b; }
        .entregas-btn { background-color: #e67e22; }

    </style>
</head>
<body>

    <!-- Container da Aranha -->
    <div id="spider-container">
        <svg width="100" height="100" viewBox="0 0 100 100">
            <g class="shadow-layer spider-body-group">
                <ellipse cx="50" cy="58" rx="8" ry="12" fill="#000" />
                <path d="M50 50 L10 20 M50 50 L90 20 M50 55 L5 55 M50 55 L95 55 M50 60 L10 90 M50 60 L90 90" stroke="#000" stroke-width="6" />
            </g>
            <g class="spider-body-group">
                <!-- Pernas -->
                <g class="leg leg-1"><path d="M45 48 L20 15 L5 30" stroke="#0a0a0a" stroke-width="2.5" fill="none"/></g>
                <g class="leg leg-2"><path d="M42 52 L10 52 L0 40" stroke="#080808" stroke-width="2.8" fill="none"/></g>
                <g class="leg leg-3"><path d="M42 56 L12 75 L5 90" stroke="#0a0a0a" stroke-width="2.5" fill="none"/></g>
                <g class="leg leg-4"><path d="M45 60 L25 95 L20 100" stroke="#050505" stroke-width="2.2" fill="none"/></g>
                <g class="leg leg-1"><path d="M55 48 L80 15 L95 30" stroke="#0a0a0a" stroke-width="2.5" fill="none"/></g>
                <g class="leg leg-2"><path d="M58 52 L90 52 L100 40" stroke="#080808" stroke-width="2.8" fill="none"/></g>
                <g class="leg leg-3"><path d="M58 56 L88 75 L95 90" stroke="#0a0a0a" stroke-width="2.5" fill="none"/></g>
                <g class="leg leg-4"><path d="M55 60 L75 95 L80 100" stroke="#050505" stroke-width="2.2" fill="none"/></g>
                <!-- Corpo -->
                <ellipse cx="50" cy="65" rx="11" ry="16" fill="#050505" />
                <ellipse cx="50" cy="46" rx="9" ry="9" fill="#0a0a0a" />
                <path d="M46 38 Q50 30 54 38" stroke="#000" stroke-width="3" fill="none" />
            </g>
        </svg>
    </div>

    <div class="container-botoes">
        <!-- Primeira Linha -->
        <div class="linha-botoes">
            <div class="item-container">
                <button class="botao-circular qr-code-btn" onclick="window.open('https://armandodecampos.github.io/Gerador-de-QR-Code/', '_self')">
                    <i class="fas fa-qrcode"></i>
                </button>
                <p>QR Code</p>
            </div>
            <div class="item-container">
                <button class="botao-circular camera-btn" onclick="window.open('https://armandodecampos.github.io/Camera-Trabalho/', '_self')">
                    <i class="fas fa-camera"></i>
                </button>
                <p>Camera</p>
            </div>
            <div class="item-container">
                <button class="botao-circular relatorio-btn" onclick="window.open('https://armandodecampos.github.io/Relat-rio-de-pessoas-por-departamentos/', '_self')">
                    <i class="fas fa-file-alt"></i>
                </button>
                <p>Relatório</p>
            </div>
            <div class="item-container">
                <button class="botao-circular pesquisa-btn" onclick="window.open('https://armandodecampos.github.io/pesquisa-de-dados/', '_self')">
                    <i class="fas fa-search"></i>
                </button>
                <p>Pesquisa</p>
            </div>
            <div class="item-container">
                <button class="botao-circular mais-opcoes-btn" onclick="window.open('https://armandodecampos.github.io/Outras-ferramentas/', '_self')">
                    <i class="fas fa-plus"></i>
                </button>
                <p>Mais opções</p>
            </div>
        </div>

        <!-- Segunda Linha -->
        <div class="linha-botoes">
            <div class="item-container">
                <button class="botao-circular acesso-btn" onclick="window.open('https://armandodecampos.github.io/controledecessos/', '_blank')">
                    <i class="fas fa-door-open"></i>
                </button>
                <p>Liberações</p>
            </div>
            <div class="item-container">
                <button class="botao-circular achados-perdidos-btn" onclick="window.open('https://armandodecampos.github.io/Achados-e-Perdidos/', '_blank')">
                    <i class="fas fa-box-open"></i>
                </button>
                 <p>Achados e Perdidos</p>
            </div>
            <div class="item-container">
                <button class="botao-circular presenca-btn" onclick="window.open('https://armandodecampos.github.io/Controle-de-Presenca-Office/', '_blank')">
                    <i class="fas fa-users"></i>
                </button>
                 <p>Presença Office</p>
            </div>
            <div class="item-container">
                <button class="botao-circular estacionamento-btn" onclick="window.open('https://armandodecampos.github.io/Estacionamento/', '_blank')">
                    <i class="fas fa-car"></i>
                </button>
                 <p>Estacionamento</p>
            </div>
            <div class="item-container">
                <button class="botao-circular entregas-btn" onclick="window.open('https://armandodecampos.github.io/Entregas-na-recepcao/', '_blank')">
                    <i class="fas fa-truck"></i>
                </button>
                 <p>Entregas</p>
            </div>
        </div>
    </div>

    <script>
        const spider = document.getElementById('spider-container');
        
        function runSpider() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const margin = 120;

            const start = getRandomEdgePoint(w, h, margin);
            const end = getRandomEdgePoint(w, h, margin);

            const angle = Math.atan2(end.y - start.y, end.x - start.x) * (180 / Math.PI) + 90;

            spider.style.display = 'block';
            spider.style.transform = `rotate(${angle}deg)`;

            const midX = start.x + (end.x - start.x) * 0.5 + (Math.random() - 0.5) * 150;
            const midY = start.y + (end.y - start.y) * 0.5 + (Math.random() - 0.5) * 150;

            const duration = 800 + Math.random() * 1000;

            const anim = spider.animate([
                { left: `${start.x}px`, top: `${start.y}px` },
                { left: `${midX}px`, top: `${midY}px` },
                { left: `${end.x}px`, top: `${end.y}px` }
            ], {
                duration: duration,
                easing: 'ease-in-out'
            });

            anim.onfinish = () => {
                spider.style.display = 'none';
                schedule();
            };
        }

        function getRandomEdgePoint(w, h, m) {
            const side = Math.floor(Math.random() * 4);
            if (side === 0) return { x: -m, y: Math.random() * h };
            if (side === 1) return { x: w + m, y: Math.random() * h };
            if (side === 2) return { x: Math.random() * w, y: -m };
            return { x: Math.random() * w, y: h + m };
        }

        function schedule() {
            // Aparece entre 5 a 15 segundos
            const next = 5000 + Math.random() * 10000;
            setTimeout(runSpider, next);
        }

        // Inicia o ciclo após 3 segundos da página carregar
        window.onload = () => {
            setTimeout(runSpider, 3000);
        };
    </script>
</body>
</html>
